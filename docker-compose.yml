# =====================================================================
# UseStock — Coolify-ready docker-compose
# ---------------------------------------------------------------------
# Deploy: paste this file into Coolify as a "Docker Compose" resource.
# Coolify auto-provides:
#   - SERVICE_FQDN_APP_80     -> public domain bound to the `app` service
# Only secrets need to be filled in Coolify UI:
#   - SERVICE_PASSWORD_POSTGRES
#   - SERVICE_PASSWORD_REVERB
#   - APP_KEY  (optional — auto-generated on first boot otherwise)
# Redis has no password (only reachable from the private compose network).
# Everything else has sane defaults baked-in.
#
# ⚠️  PERSISTENT STORAGE — IMPORTANT
# The named volumes below (app_storage, db_data, redis_data) MUST be marked
# as Persistent in Coolify (Storages tab). app_storage holds the downloaded
# files under storage/app/downloads — if it is recreated on each deploy, all
# previously downloaded files vanish and the library shows them as expired.
# A single storage volume is shared by app + worker + scheduler so the file
# the worker writes is the same file the web serves.
# =====================================================================

x-app-env: &app-env
  APP_NAME: "UseStock"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "${SERVICE_FQDN_APP_80:-${SERVICE_FQDN_APP:-http://localhost}}"
  # Cookies follow whichever scheme the public URL announces.
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-auto}"
  APP_KEY: "${APP_KEY:-}"

  LOG_CHANNEL: "stack"
  LOG_STACK: "single"
  LOG_LEVEL: "info"

  DB_CONNECTION: "pgsql"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_DATABASE: "usestock"
  DB_USERNAME: "usestock"
  DB_PASSWORD: "${SERVICE_PASSWORD_POSTGRES:?set SERVICE_PASSWORD_POSTGRES in Coolify}"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # Redis lives on the private Docker network — Coolify doesn't publish it,
  # so no password is required. Leaving REDIS_PASSWORD empty makes Laravel /
  # Predis skip AUTH, which matches an unauthenticated redis-server.
  REDIS_PASSWORD: ""
  REDIS_CLIENT: "predis"

  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "120"
  QUEUE_CONNECTION: "redis"

  FILESYSTEM_DISK: "local"
  DOWNLOADS_DISK: "downloads"

  BROADCAST_CONNECTION: "reverb"
  REVERB_APP_ID: "usestock"
  REVERB_APP_KEY: "usestock-public-key"
  REVERB_APP_SECRET: "${SERVICE_PASSWORD_REVERB:?set SERVICE_PASSWORD_REVERB in Coolify}"
  REVERB_HOST: "reverb"
  REVERB_PORT: "8080"
  REVERB_SCHEME: "http"

  MAIL_MAILER: "log"   # overridden by admin panel once Resend key is set in DB

  TRUSTED_PROXIES: "*"

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/julioandolfo/usestock:latest}
    build:
      context: .
      dockerfile: Dockerfile
    command: ["app"]
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "coolify.managed=true"
    expose:
      - "80"

  worker:
    image: ${APP_IMAGE:-ghcr.io/julioandolfo/usestock:latest}
    command: ["worker"]
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'horizon' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  scheduler:
    image: ${APP_IMAGE:-ghcr.io/julioandolfo/usestock:latest}
    command: ["scheduler"]
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  reverb:
    image: ${APP_IMAGE:-ghcr.io/julioandolfo/usestock:latest}
    command: ["reverb"]
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "8080"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "usestock"
      POSTGRES_USER: "usestock"
      POSTGRES_PASSWORD: "${SERVICE_PASSWORD_POSTGRES:?set SERVICE_PASSWORD_POSTGRES in Coolify}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usestock -d usestock"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No requirepass — the service is only reachable from other containers on
    # the private compose network. Every previous attempt to pass a password
    # from the Coolify UI failed because ${SERVICE_PASSWORD_REDIS} may contain
    # $, !, quotes, or spaces that break either compose's variable expansion,
    # the exec-form argv, or the healthcheck's argv escaping.
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    expose:
      - "6379"

volumes:
  app_storage:
  db_data:
  redis_data:
